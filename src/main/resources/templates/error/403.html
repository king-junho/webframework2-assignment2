<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>접근 거부 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    .error-box {
      max-width: 720px;
      margin: 80px auto;
    }
    .error-code {
      font-size: 4rem;
      font-weight: 800;
      color: #e94560;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    <div class="ms-auto">
      <a th:href="@{/products}" class="btn btn-outline-light btn-sm">상품 목록</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="card border-0 shadow-sm error-box">
    <div class="card-body text-center p-5">
      <div class="error-code">403</div>
      <h3 class="fw-bold mb-3">접근 권한이 없습니다</h3>
      <p class="text-muted mb-4">
        이 페이지는 관리자 권한이 있는 사용자만 접근할 수 있습니다.
      </p>

      <div class="d-flex justify-content-center gap-2">
        <a th:href="@{/products}" class="btn btn-primary px-4">상품 목록으로</a>
        <a th:href="@{/home}" class="btn btn-outline-secondary px-4">홈으로</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
